# fly.toml app configuration file generated for our-eight-cheebee on 2026-04-21T23:19:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'our-eight-cheebee'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
